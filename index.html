<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Te Amo ❤</title>
  <link rel="stylesheet" href="style.css" />
  <!-- SOLO gsap core — CERO plugins de pago -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══ MÚSICA — se reproduce al hacer click ══ -->
  <audio id="bg-music" src="music.mp3" preload="auto"></audio>

  <!-- LÍNEA DE SUELO -->
  <div id="ground-line"></div>

  <!-- ══════════════════════════════════════
       CAPA 1 · INTRO
  ══════════════════════════════════════ -->
  <div id="intro-layer">
    <div id="morph-wrap">
      <!-- CORAZÓN (tamaño inicial: más pequeño) -->
      <svg id="heart-svg" viewBox="0 0 100 88" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hGrad" cx="42%" cy="32%" r="62%">
            <stop offset="0%"   stop-color="#ff607a"/>
            <stop offset="50%"  stop-color="#e4102e"/>
            <stop offset="100%" stop-color="#9a0018"/>
          </radialGradient>
          <filter id="hGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="5" stdDeviation="7"
                          flood-color="#d90429" flood-opacity="0.55"/>
          </filter>
        </defs>
        <path d="M50,78 C50,78 8,52 8,28 C8,13 20,4 33,4 C40,4 47,8 50,15
                 C53,8 60,4 67,4 C80,4 92,13 92,28 C92,52 50,78 50,78Z"
          fill="url(#hGrad)" filter="url(#hGlow)"/>
        <!-- Brillo especular -->
        <ellipse cx="36" cy="24" rx="12" ry="7"
          fill="white" opacity="0.18" transform="rotate(-30,36,24)"/>
      </svg>

      <!-- CÍRCULO — más pequeño que el corazón (r=34 vs r=44) -->
      <svg id="circle-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" fill="url(#hGrad)" filter="url(#hGlow)"/>
      </svg>
    </div>

    <!-- FIX #3: "Te amo" en lugar de "toca para comenzar" -->
    <p id="tap-hint">Te amo</p>
  </div>

  <!-- ══════════════════════════════════════
       CAPA 2 · ÁRBOL SVG
       FIX #4: Árbol fino y elegante,
       un solo tronco con ramas delgadas.
       Sin ellipses "knot" que causaban los
       círculos marrones.
  ══════════════════════════════════════ -->
  <div id="tree-layer">
    <svg id="tree-svg" viewBox="0 0 400 700"
         xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="barkG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#3a1808"/>
          <stop offset="45%"  stop-color="#7a3e14"/>
          <stop offset="100%" stop-color="#4a2008"/>
        </linearGradient>
        <linearGradient id="barkG2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#4a2008"/>
          <stop offset="50%"  stop-color="#8c4a1e"/>
          <stop offset="100%" stop-color="#3a1808"/>
        </linearGradient>
      </defs>

      <!-- ─── TRONCO: BASE gruesa ─── -->
      <path class="treepath" id="trunk1"
        stroke="url(#barkG)" stroke-width="13" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        d="M200,700 C199,675 197,646 198,614 C199,582 204,555 200,524
           C196,493 190,470 196,440"/>

      <!-- ─── TRONCO: SUPERIOR más fino ─── -->
      <path class="treepath" id="trunk2"
        stroke="url(#barkG)" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        d="M196,440 C202,410 208,386 200,354
           C192,322 185,298 192,265"/>

      <!-- ─── RAMAS IZQUIERDA (de gruesa a fina) ─── -->
      <!-- Rama L1: más externa, más baja -->
      <path class="treepath" id="bl1"
        stroke="url(#barkG2)" stroke-width="6" fill="none"
        stroke-linecap="round"
        d="M197,415 C168,390 128,355 85,312 C48,274 16,234 -8,188"/>

      <!-- Rama L2 -->
      <path class="treepath" id="bl2"
        stroke="url(#barkG2)" stroke-width="5" fill="none"
        stroke-linecap="round"
        d="M198,382 C173,355 144,325 112,290 C80,255 52,218 28,178"/>

      <!-- Rama L3 -->
      <path class="treepath" id="bl3"
        stroke="url(#barkG2)" stroke-width="4" fill="none"
        stroke-linecap="round"
        d="M199,350 C178,322 152,292 124,259 C96,226 70,191 48,154"/>

      <!-- Rama L4: más interna -->
      <path class="treepath" id="bl4"
        stroke="#6b3210" stroke-width="3" fill="none"
        stroke-linecap="round"
        d="M200,318 C184,290 164,262 142,231 C120,200 100,168 82,135"/>

      <!-- ─── RAMAS DERECHA (simétricas con ligera asimetría) ─── -->
      <!-- Rama R1: más externa -->
      <path class="treepath" id="br1"
        stroke="url(#barkG2)" stroke-width="6" fill="none"
        stroke-linecap="round"
        d="M203,412 C234,386 274,350 315,306 C352,266 384,224 408,180"/>

      <!-- Rama R2 -->
      <path class="treepath" id="br2"
        stroke="url(#barkG2)" stroke-width="5" fill="none"
        stroke-linecap="round"
        d="M202,378 C228,350 258,318 290,283 C322,248 350,211 372,170"/>

      <!-- Rama R3 -->
      <path class="treepath" id="br3"
        stroke="url(#barkG2)" stroke-width="4" fill="none"
        stroke-linecap="round"
        d="M201,346 C222,317 248,286 276,252 C304,218 328,183 348,146"/>

      <!-- Rama R4: más interna -->
      <path class="treepath" id="br4"
        stroke="#6b3210" stroke-width="3" fill="none"
        stroke-linecap="round"
        d="M200,314 C216,285 236,256 258,224 C280,192 300,160 318,126"/>

      <!-- ─── RAMA CENTRAL (hacia arriba) ─── -->
      <path class="treepath" id="bcenter"
        stroke="#6b3210" stroke-width="4" fill="none"
        stroke-linecap="round"
        d="M200,290 C198,258 196,224 198,190 C200,156 205,124 200,88"/>

      <!-- ─── RAMITAS TERMINALES (muy finas) ─── -->
      <!-- Tips L1 -->
      <path class="treepath" id="tw-l1a"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M-8,188 C-20,165 -30,140 -36,112"/>
      <path class="treepath" id="tw-l1b"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M-8,188 C-5,162 0,134 4,108"/>

      <!-- Tips L2 -->
      <path class="treepath" id="tw-l2a"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M28,178 C14,152 2,124 -4,96"/>
      <path class="treepath" id="tw-l2b"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M28,178 C30,150 35,122 36,94"/>

      <!-- Tips L3 -->
      <path class="treepath" id="tw-l3"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M48,154 C36,128 26,100 18,72"/>

      <!-- Tips R1 -->
      <path class="treepath" id="tw-r1a"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M408,180 C420,156 430,130 436,102"/>
      <path class="treepath" id="tw-r1b"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M408,180 C405,154 400,126 398,100"/>

      <!-- Tips R2 -->
      <path class="treepath" id="tw-r2a"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M372,170 C384,144 394,116 400,88"/>
      <path class="treepath" id="tw-r2b"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M372,170 C368,142 367,114 368,88"/>

      <!-- Tips R3 -->
      <path class="treepath" id="tw-r3"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M348,146 C358,118 366,90 370,62"/>

      <!-- Tip center -->
      <path class="treepath" id="tw-c"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"
        d="M200,88 C198,62 196,36 200,10"/>
    </svg>
  </div>

  <!-- ══ HOJAS (generadas en JS) ══ -->
  <div id="leaves-layer" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════
       CAPA 3 · TEXTO FINAL
  ══════════════════════════════════════ -->
  <div id="text-layer">
    <div id="text-ornament">
      <span class="orn-line"></span>
      <span class="orn-heart">❤</span>
      <span class="orn-line"></span>
    </div>

    <p id="love-text"></p>
    <p id="love-sig">— I Love You</p>

    <div id="counter-divider"></div>

    <!-- FIX #1: Años/Meses/Días estáticos -->
    <div id="counter-wrap">
      <div class="cu" id="cu-y"><span class="cn">0</span><span class="cl">años</span></div>
      <span class="csep">·</span>
      <div class="cu" id="cu-m"><span class="cn">0</span><span class="cl">meses</span></div>
      <span class="csep">·</span>
      <div class="cu" id="cu-d"><span class="cn">0</span><span class="cl">días</span></div>
    </div>

    <!-- FIX #1: Horas/Minutos/Segundos en vivo (tican cada segundo) -->
    <div id="counter-live">
      <div class="live-block" id="cu-h">
        <span class="ln" id="lv-h">00</span>
        <span class="ll">hrs</span>
      </div>
      <span class="live-sep">:</span>
      <div class="live-block" id="cu-min">
        <span class="ln" id="lv-min">00</span>
        <span class="ll">min</span>
      </div>
      <span class="live-sep">:</span>
      <div class="live-block" id="cu-s">
        <span class="ln" id="lv-s">00</span>
        <span class="ll">seg</span>
      </div>
    </div>

    <p id="counter-caption">juntos desde el 12 · 04 · 2021</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
