<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Árbol del Amor ❤</title>
  <link rel="stylesheet" href="style.css" />

  <!-- GSAP 3 + Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MorphSVGPlugin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ══════════════════════════════════════════
       SUELO — línea de horizonte animada
  ══════════════════════════════════════════ -->
  <div id="ground-line"></div>

  <!-- ══════════════════════════════════════════
       CAPA 1 · INTRO  — Corazón interactivo
  ══════════════════════════════════════════ -->
  <div id="intro-layer">
    <svg id="heart-svg" viewBox="0 0 100 88" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hGrad" cx="42%" cy="32%" r="62%">
          <stop offset="0%"   stop-color="#ff607a"/>
          <stop offset="50%"  stop-color="#e4102e"/>
          <stop offset="100%" stop-color="#9a0018"/>
        </radialGradient>
        <filter id="hGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="6" stdDeviation="7"
                        flood-color="#d90429" flood-opacity="0.5"/>
          <feDropShadow dx="0" dy="0" stdDeviation="18"
                        flood-color="#ff4466" flood-opacity="0.3"/>
        </filter>
        <radialGradient id="hShine" cx="38%" cy="26%" r="30%">
          <stop offset="0%"   stop-color="white" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!--
        CORAZÓN — path Bézier estándar.
        MorphSVGPlugin lo transformará en círculo al caer.
      -->
      <path id="heart-path"
        d="M 50,78
           C 50,78  8,52  8,28
           C 8,13   20,4   33,4
           C 40,4   47,8   50,15
           C 53,8   60,4   67,4
           C 80,4   92,13  92,28
           C 92,52  50,78  50,78 Z"
        fill="url(#hGrad)" filter="url(#hGlow)"/>

      <!-- Brillo encima -->
      <path id="heart-shine"
        d="M 50,78
           C 50,78  8,52  8,28
           C 8,13   20,4   33,4
           C 40,4   47,8   50,15
           C 53,8   60,4   67,4
           C 80,4   92,13  92,28
           C 92,52  50,78  50,78 Z"
        fill="url(#hShine)" pointer-events="none"/>
    </svg>

    <p id="tap-hint">toca para comenzar</p>
  </div>

  <!-- ══════════════════════════════════════════
       CAPA 2 · ÁRBOL SVG orgánico
       viewBox 0 0 400 700, centrado en la pantalla
  ══════════════════════════════════════════ -->
  <div id="tree-layer">
    <svg id="tree-svg" viewBox="0 0 400 700"
         xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="barkG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#2e1205"/>
          <stop offset="30%"  stop-color="#6b3210"/>
          <stop offset="68%"  stop-color="#9a4e1a"/>
          <stop offset="100%" stop-color="#4a2008"/>
        </linearGradient>
        <linearGradient id="barkG2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#3a1808"/>
          <stop offset="50%"  stop-color="#7c3e16"/>
          <stop offset="100%" stop-color="#3e1a06"/>
        </linearGradient>
      </defs>

      <!-- ───── RAÍCES ───── -->
      <path class="root" id="root-l1"
        d="M 194,699 C 178,696 155,693 130,696 C 105,699 80,697 55,700"
        stroke="#2e1205" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path class="root" id="root-l2"
        d="M 190,699 C 168,695 140,692 110,695 C 84,698 60,696 32,700"
        stroke="#2e1205" stroke-width="6"  fill="none" stroke-linecap="round"/>
      <path class="root" id="root-r1"
        d="M 206,699 C 224,696 248,693 272,696 C 298,699 322,697 348,700"
        stroke="#2e1205" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path class="root" id="root-r2"
        d="M 210,699 C 232,695 260,692 288,695 C 314,698 340,696 366,700"
        stroke="#2e1205" stroke-width="6"  fill="none" stroke-linecap="round"/>
      <path class="root" id="root-c"
        d="M 200,699 C 200,695 198,690 200,684 C 202,678 204,672 200,666"
        stroke="#2e1205" stroke-width="7"  fill="none" stroke-linecap="round"/>

      <!-- ───── TRONCO: SOMBRA ───── -->
      <path class="trunk-shadow" id="trunk-shad"
        d="M 196,698
           C 193,672  188,645  190,616
           C 192,587  200,563  197,536
           C 194,509  186,487  189,460
           C 192,433  200,414  198,386
           C 196,358  188,338  191,310
           C 194,282  202,264  199,238
           C 196,212  190,195  194,170"
        stroke="#1a0802" stroke-width="34" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>

      <!-- ───── TRONCO: BASE (grosor 44) ───── -->
      <path class="trunk" id="trunk-base"
        d="M 200,698
           C 197,672  192,645  194,616
           C 196,587  204,563  201,536
           C 198,509  190,487  193,460"
        stroke="url(#barkG)" stroke-width="44" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Nudo 1 -->
      <ellipse class="knot" cx="197" cy="548"
        rx="12" ry="7" fill="#2a1005" opacity="0.5"
        transform="rotate(-10,197,548)"/>

      <!-- ───── TRONCO: MEDIO (grosor 28) ───── -->
      <path class="trunk" id="trunk-mid"
        d="M 193,460
           C 196,433  204,414  202,386
           C 200,358  192,338  195,310"
        stroke="url(#barkG)" stroke-width="28" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Nudo 2 -->
      <ellipse class="knot" cx="198" cy="395"
        rx="9" ry="5.5" fill="#2a1005" opacity="0.45"
        transform="rotate(8,198,395)"/>

      <!-- ───── TRONCO: SUPERIOR (grosor 15) ───── -->
      <path class="trunk" id="trunk-top"
        d="M 195,310
           C 198,282  206,264  203,238
           C 200,212  194,195  198,170"
        stroke="url(#barkG)" stroke-width="15" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- ─── RAMAS PRIMARIAS IZQ ─── -->
      <path class="branch p1" id="b-l1"
        d="M 194,455
           C 172,438  144,424  112,410
           C 84,398   58,390   30,382"
        stroke="url(#barkG)" stroke-width="18" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <path class="branch p1" id="b-l2"
        d="M 193,392
           C 168,372  138,356  104,340
           C 74,326   46,316   18,304"
        stroke="url(#barkG)" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <path class="branch p1" id="b-l3"
        d="M 195,322
           C 168,300  136,282  100,262
           C 68,244   38,230   6,214"
        stroke="url(#barkG2)" stroke-width="11" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- ─── RAMAS PRIMARIAS DER ─── -->
      <path class="branch p1" id="b-r1"
        d="M 204,445
           C 228,428  256,414  286,400
           C 312,388  340,380  368,372"
        stroke="url(#barkG)" stroke-width="18" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <path class="branch p1" id="b-r2"
        d="M 205,382
           C 232,362  262,344  294,328
           C 322,314  352,304  382,292"
        stroke="url(#barkG)" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <path class="branch p1" id="b-r3"
        d="M 204,312
           C 232,290  264,268  298,248
           C 328,230  360,216  392,200"
        stroke="url(#barkG2)" stroke-width="11" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- ─── RAMAS SECUNDARIAS IZQ ─── -->
      <path class="branch s1" id="bs-l1a"
        d="M 112,410 C 90,392 66,372 44,350 C 26,332 10,312 -4,290"
        stroke="#5a2a0c" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-l1b"
        d="M 68,396 C 48,374 28,350 10,324 C -4,302 -14,278 -22,252"
        stroke="#5a2a0c" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-l2a"
        d="M 104,340 C 80,316 54,290 30,262 C 10,240 -8,214 -24,188"
        stroke="#5a2a0c" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-l2b"
        d="M 60,322 C 38,294 16,264 -4,232 C -20,206 -32,176 -42,148"
        stroke="#5a2a0c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-l3a"
        d="M 100,262 C 74,236 48,206 24,174 C 4,148 -14,118 -28,88"
        stroke="#6b3210" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- ─── RAMAS SECUNDARIAS DER ─── -->
      <path class="branch s1" id="bs-r1a"
        d="M 286,400 C 308,380 330,356 350,330 C 366,308 380,284 392,258"
        stroke="#5a2a0c" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-r1b"
        d="M 334,386 C 354,360 372,332 386,302 C 398,278 406,250 410,222"
        stroke="#5a2a0c" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-r2a"
        d="M 294,328 C 316,300 338,268 356,234 C 372,206 384,174 392,142"
        stroke="#5a2a0c" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-r2b"
        d="M 344,308 C 362,276 378,240 390,204 C 400,172 406,138 408,104"
        stroke="#5a2a0c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path class="branch s1" id="bs-r3a"
        d="M 298,248 C 320,218 340,184 356,148 C 368,118 376,84 378,50"
        stroke="#6b3210" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- ─── CORONA: PUNTA DEL ÁRBOL ─── -->
      <path class="branch crown" id="bc-l"
        d="M 198,245
           C 182,224  162,202  138,178
           C 116,156   92,134   64,112"
        stroke="#7a3c14" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path class="branch crown" id="bc-r"
        d="M 204,232
           C 220,210  240,186  264,162
           C 286,140  312,118  340,96"
        stroke="#7a3c14" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path class="branch crown" id="bc-c"
        d="M 201,218
           C 198,196  196,172  198,146
           C 200,120  205,96   202,72"
        stroke="#7a3c14" stroke-width="7" fill="none" stroke-linecap="round"/>

      <!-- Ramitas terminales muy finas -->
      <path class="branch twig" id="tw-1"
        d="M 138,178 C 118,156 96,132 72,108 C 52,88 30,68 6,50"
        stroke="#8c4a1e" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path class="branch twig" id="tw-2"
        d="M 64,112 C 44,88 24,62 6,36 C -8,14 -18,-10 -24,-36"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path class="branch twig" id="tw-3"
        d="M 264,162 C 284,136 302,108 316,80 C 328,56 336,28 338,0"
        stroke="#8c4a1e" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path class="branch twig" id="tw-4"
        d="M 340,96 C 358,68 372,36 380,4 C 386,-22 388,-50 386,-78"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path class="branch twig" id="tw-5"
        d="M 202,72 C 198,46 196,18 200,-8 C 204,-32 210,-56 206,-82"
        stroke="#8c4a1e" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- ══════════════════════════════════════════
       CAPA 3 · HOJAS (generadas dinámicamente)
  ══════════════════════════════════════════ -->
  <div id="leaves-layer" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════
       CAPA 4 · TEXTO Y CONTADOR
  ══════════════════════════════════════════ -->
  <div id="text-layer">
    <div id="text-ornament">
      <span class="orn-line"></span>
      <span class="orn-heart">❤</span>
      <span class="orn-line"></span>
    </div>

    <p id="love-text"></p>
    <p id="love-sig">— I Love You</p>

    <div id="counter-divider"></div>

    <div id="counter-wrap">
      <div class="cu" id="cu-y">
        <span class="cn">0</span>
        <span class="cl">años</span>
      </div>
      <span class="csep">·</span>
      <div class="cu" id="cu-m">
        <span class="cn">0</span>
        <span class="cl">meses</span>
      </div>
      <span class="csep">·</span>
      <div class="cu" id="cu-d">
        <span class="cn">0</span>
        <span class="cl">días</span>
      </div>
    </div>

    <p id="counter-caption">juntos desde el 12 · 04 · 2021</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
