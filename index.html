<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol de San Valentín</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Capa de Intro -->
    <div id="intro-layer">
        <div id="morph-wrap">
            <div id="heart-svg">❤️</div>
            <div id="circle-svg" style="opacity:0; width:20px; height:20px; background:red; border-radius:50%; position:absolute;"></div>
            <p id="tap-hint">toca para comenzar</p>
        </div>
    </div>

    <div id="ground-line"></div>

    <!-- Capa del Árbol -->
    <div id="tree-layer">
        <svg id="tree-svg" viewBox="0 0 400 600">
            <!-- Tronco y ramas (simplificado para asegurar dibujo) -->
            <path class="trunk" d="M200,550 Q200,300 200,150" stroke="#5d4037" stroke-width="12" fill="none" />
            <path class="branch" d="M200,400 Q150,350 100,300" stroke="#5d4037" stroke-width="8" fill="none" />
            <path class="branch" d="M200,400 Q250,350 300,300" stroke="#5d4037" stroke-width="8" fill="none" />
            <path class="branch" d="M200,250 Q120,200 80,150" stroke="#5d4037" stroke-width="6" fill="none" />
            <path class="branch" d="M200,250 Q280,200 320,150" stroke="#5d4037" stroke-width="6" fill="none" />
        </svg>
    </div>

    <div id="leaves-layer"></div>

    <!-- Capa de Texto -->
    <div id="text-layer" style="opacity:0;">
        <div id="text-ornament">✿</div>
        <p id="love-text"></p>
        <p id="love-sig">- I Love You! -</p>
        
        <div id="counter-divider"></div>
        <div id="counter-wrap">
            <div id="cu-y" class="unit"><span class="cn">0</span><span class="cl">Años</span></div>
            <div id="cu-m" class="unit"><span class="cn">0</span><span class="cl">Meses</span></div>
            <div id="cu-d" class="unit"><span class="cn">0</span><span class="cl">Días</span></div>
        </div>
        <p id="counter-caption">Mi amor por ti comenzó hace...</p>
    </div>

    <!-- LIBRERÍAS: Solo la principal para evitar errores -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
